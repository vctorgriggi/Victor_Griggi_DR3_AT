name: Secret Demo

on: push

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secret
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY nao configurado"
          fi
